<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Billigt Filament</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">BILLIGT<span>FILAMENT</span></a>
            
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="main-nav" id="main-nav">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Products</a>
                <a href="about.html">About Us</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0;">
        <h1 style="font-size: 2.8rem; margin-bottom: 40px; letter-spacing: -2px;">Our Collection</h1>

        <div class="filters-wrapper">
            <div class="filter-row">
                <div class="filter-group"> 
                    <label class="filter-label">Search the catalog</label>
                    <input type="text" id="searchField" class="search-input" placeholder="Search here...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Sort by</label>
                    <select id="sortOrder" class="sort-select">
                        <option value="default">Most relevant</option>
                        <option value="low">Price: Low to High</option>
                        <option value="high">Price: High to Low</option>
                    </select>
                </div>
            </div>

            <div class="material-selection">
                <label class="filter-label">Select Category / Material</label>
                <div class="material-boxes" id="materialBoxes">
                    <button class="material-btn active" data-cat="all">All</button>
                    <button class="material-btn" data-cat="PRINTER">3D Printers</button>
                </div>
            </div>
        </div>

        <div id="productGrid" class="product-grid"></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Billigt Filament ApS. Quality materials for 3D printing.</p>
        </div>
    </footer>
    
    <script src="Assets/script.js"></script>
</body>
</html>
